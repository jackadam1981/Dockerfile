name: Build from git address

on:
    workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: sudosubin/git-clone-action@v1
        with:
          # Repository owner and name. Ex: sudosubin/git-clone-action
          # Default: gitea/act_runner
          repository: 'gitea/act_runner'
          # Git host platform. Ex: github, gitlab, bitbucket, gitee, or else (git.suckless.org, ...)
          # Default: 'gitea.com'
          platform: 'gitea.com'
      
          # Git branch, tag, or specific commit SHA to checkout.
          # Default: (auto default branch)
          ref: ''
      
          # Relative path from current directory, where to clone.
          path: ''
      
          # Todos below
          # fetch-depth
          # submodules

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_PASSWORD }}"

      - name: Build and push images
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm/v6,linux/arm/v7,amd64,linux/arm64
          push: true
          tags: "jackadam/gitea:${{ needs.check.outputs.version }},jackadam/gitea:latest"
